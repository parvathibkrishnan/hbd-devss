<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | From the Wifeyyss 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root { --bts-purple: #6c4ab6; --soft-pink: #f8bbd0; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Montserrat', sans-serif; background: #0f0c29; color: white; padding: 60px 5%; text-align: center; }
        h2 { font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 40px; }
        .video-container { display: flex; flex-direction: column; gap: 40px; max-width: 500px; margin: 0 auto; }
        .video-box { background: var(--glass); padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); }
        video { width: 100%; border-radius: 15px; background: black; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .name-tag { margin-top: 15px; font-weight: bold; color: var(--soft-pink); font-size: 1.1rem; }
        .back-btn { display: inline-block; margin-top: 40px; color: white; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid transparent; transition: 0.3s; }
        .back-btn:hover { border-bottom: 1px solid white; }
    </style>
</head>
<body>
    <h2>Messages from the Wifeyyss</h2>
    <div class="video-container">
        <div class="video-box">
            <video controls playsinline preload="metadata">
                <source src="hitha.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="name-tag">From Hitha 💜</div>
        </div>

        <div class="video-box">
            <video controls playsinline preload="metadata">
                <source src="kibah.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="name-tag">From Kibah 💜</div>
        </div>

        <div class="video-box">
            <video controls playsinline preload="metadata">
                <source src="paruz.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="name-tag">From Paruz 💜</div>
        </div>
    </div>
    <a href="vault.html" class="back-btn">← Back to Vault</a>
</body>
</html>
