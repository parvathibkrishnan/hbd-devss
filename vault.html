<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Memories 💜</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            --bts-purple: #6c4ab6;
            --hot-pink: #ff1493;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to bottom, #0f0c29, #302b63);
            color: white;
            min-height: 100vh;
            padding: 80px 5% 40px;
            text-align: center;
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            margin-bottom: 10px; 
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #f8bbd0;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 25px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .vault-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 50px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .vault-card:hover { 
            transform: translateY(-12px); 
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(255, 20, 147, 0.3);
            border-color: var(--hot-pink);
        }

        .material-symbols-rounded {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #f8bbd0; 
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }

        .vault-card h3 { 
            font-size: 1.4rem; 
            margin-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vault-card p { 
            font-size: 0.85rem; 
            opacity: 0.8; 
            font-weight: 400;
        }

        .back-btn { 
            display: inline-block; 
            margin-top: 60px; 
            color: #f8bbd0; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-btn:hover { letter-spacing: 3px; }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .vault-card { padding: 30px 10px; }
            .material-symbols-rounded { font-size: 2.5rem; }
            .vault-card h3 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <h2>The Memory Vault</h2>
    <p class="subtitle">Personalized for Devss</p>

    <div class="grid">
        <a href="diva.html" class="vault-card">
            <span class="material-symbols-rounded">diamond</span>
            <h3>The Diva</h3>
            <p>Main Character Energy</p>
        </a>

        <a href="uss.html" class="vault-card">
            <span class="material-symbols-rounded">groups</span>
            <h3>Us</h3>
            <p>Friendship Files</p>
        </a>

        <a href="messages.html" class="vault-card">
            <span class="material-symbols-rounded">forum</span>
            <h3>Messages</h3>
            <p>From Your 3 Wifeyyyss</p>
        </a>

        <a href="meet.html" class="vault-card">
            <span class="material-symbols-rounded">movie</span>
            <h3>The Meet</h3>
            <p>Our Special Edit</p>
        </a>
    </div>

    <a href="index.html" class="back-btn">← Back to Main</a>

</body>
</html>
